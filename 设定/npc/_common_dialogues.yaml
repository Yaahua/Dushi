# ============================================
# 通用对话库
# 可被多个NPC引用的共享对话内容
# ============================================

# 路人通用对话
ambient_citizen:
  greeting:
    - "..."
    - "（对方看了你一眼，没有说话）"
    - "有事吗？"
    
  topics:
    - id: weather
      name: 天气
      lines:
        - "今天真热。"
        - "听说要下雨了。"
        
    - id: complain
      name: 抱怨
      lines:
        - "房租又涨了..."
        - "这日子真难过。"

# 服务人员通用对话
service_worker:
  greeting:
    - "欢迎，需要什么？"
    - "您好。"
    
  topics:
    - id: work
      name: 工作
      lines:
        - "工作很忙，但总得生活。"
        - "这工作也就这样吧。"

# 拒绝交互对话
rejection:
  low_relationship:
    - "我不和陌生人说话。"
    - "你是谁？走开。"
    
  busy:
    - "现在没空。"
    - "（对方看起来很忙）"
    
  hostile:
    - "滚开。"
    - "离我远点。"
